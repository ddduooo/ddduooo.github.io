<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ddduooo · 项目页</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #090a14;
        --bg-2: #171731;
        --text: #eaf0ff;
        --muted: #9da3ba;
        --card: rgba(18, 25, 48, 0.7);
        --border: rgba(160, 180, 255, 0.22);
        --accent: #74b8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, #1f2a57, transparent 40%),
          radial-gradient(circle at 80% 15%, #402269, transparent 35%),
          linear-gradient(130deg, var(--bg-1), var(--bg-2));
        overflow-x: hidden;
      }

      #particles {
        position: fixed;
        inset: 0;
        z-index: -2;
      }

      .cursor-glow {
        position: fixed;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        pointer-events: none;
        background: radial-gradient(circle, rgba(116, 184, 255, 0.24), transparent 65%);
        filter: blur(8px);
        transform: translate(-50%, -50%);
        z-index: -1;
      }

      .wrap {
        width: min(1100px, 92vw);
        margin: 0 auto;
        padding: 48px 0 80px;
      }

      .hero {
        border: 1px solid var(--border);
        background: rgba(10, 16, 34, 0.66);
        border-radius: 24px;
        padding: 48px 36px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(8px);
        animation: float 6s ease-in-out infinite;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 3.5vw, 3rem);
      }

      .hero p {
        color: var(--muted);
        line-height: 1.75;
        margin-top: 16px;
      }

      .list-title {
        margin: 36px 0 18px;
        font-size: 1.2rem;
      }

      .projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .project-card {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--card);
        padding: 18px;
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .project-card:hover {
        transform: translateY(-5px);
        border-color: rgba(116, 184, 255, 0.8);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3);
      }

      .project-card a {
        color: var(--text);
        text-decoration: none;
        font-size: 1.05rem;
        font-weight: 700;
      }

      .meta {
        margin-top: 8px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        font-size: 0.92rem;
      }

      .desc {
        color: #c5cee8;
        margin-top: 10px;
        font-size: 0.94rem;
      }

      .status {
        color: var(--muted);
        margin-top: 8px;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="particles"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>
    <main class="wrap">
      <section class="hero">
        <h1>你好，我是 ddduooo 👋</h1>
        <p>
          这里是我的项目主页。下方优先展示我 <strong>Public 仓库中 Star 最多</strong> 的项目，
          并且页面提供了背景动态、鼠标光标动效与卡片交互动效。
        </p>
      </section>

      <h2 class="list-title">⭐ 热门项目（按 Star 数降序）</h2>
      <div id="projectList" class="projects"></div>
      <p class="status" id="loadStatus">正在加载项目列表...</p>
    </main>

    <script>
      const username = "ddduooo";

      async function loadProjects() {
        const list = document.getElementById("projectList");
        const status = document.getElementById("loadStatus");
        try {
          const response = await fetch(
            `https://api.github.com/users/${username}/repos?per_page=100&type=public`
          );
          if (!response.ok) throw new Error("GitHub API 请求失败");
          const repos = await response.json();
          const sorted = repos
            .filter((repo) => !repo.fork)
            .sort((a, b) => b.stargazers_count - a.stargazers_count)
            .slice(0, 12);

          if (!sorted.length) {
            status.textContent = "暂未获取到可展示项目。";
            return;
          }

          list.innerHTML = "";
          sorted.forEach((repo) => {
            const card = document.createElement("article");
            card.className = "project-card";

            const link = document.createElement("a");
            link.href = repo.html_url;
            link.target = "_blank";
            link.rel = "noreferrer";
            link.textContent = repo.name;

            const meta = document.createElement("div");
            meta.className = "meta";

            const lang = document.createElement("span");
            lang.textContent = repo.language || "Unknown";

            const stars = document.createElement("span");
            stars.textContent = `⭐ ${repo.stargazers_count}`;

            meta.appendChild(lang);
            meta.appendChild(stars);

            const desc = document.createElement("div");
            desc.className = "desc";
            desc.textContent = repo.description || "暂无描述";

            card.appendChild(link);
            card.appendChild(meta);
            card.appendChild(desc);
            list.appendChild(card);
          });
          status.textContent = "";
        } catch (error) {
          status.textContent = "加载失败，请稍后刷新重试。";
        }
      }

      function setupCursorGlow() {
        const glow = document.getElementById("cursorGlow");
        window.addEventListener("mousemove", (event) => {
          glow.style.left = `${event.clientX}px`;
          glow.style.top = `${event.clientY}px`;
        });
      }

      function setupParticles() {
        const canvas = document.getElementById("particles");
        const context = canvas.getContext("2d");
        const particles = Array.from({ length: 60 }, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.6 + 0.6,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
        }));

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        function draw() {
          context.clearRect(0, 0, canvas.width, canvas.height);
          context.fillStyle = "rgba(167, 201, 255, 0.75)";
          particles.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            context.beginPath();
            context.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            context.fill();
          });
          requestAnimationFrame(draw);
        }

        resize();
        draw();
        window.addEventListener("resize", resize);
      }

      loadProjects();
      setupCursorGlow();
      setupParticles();
    </script>
  </body>
</html>
